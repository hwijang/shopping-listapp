<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 리스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 480px;
    overflow: hidden;
  }
  header {
    background: #4a5568;
    color: #fff;
    padding: 24px;
    text-align: center;
  }
  header h1 { font-size: 24px; font-weight: 600; }
  header p { margin-top: 4px; font-size: 13px; opacity: 0.8; }
  .input-row {
    display: flex;
    gap: 8px;
    padding: 20px;
    border-bottom: 1px solid #edf2f7;
  }
  #item-input {
    flex: 1;
    padding: 12px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  #item-input:focus { border-color: #667eea; }
  #add-btn {
    padding: 12px 20px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #add-btn:hover { background: #5568d3; }
  #add-btn:active { transform: translateY(1px); }
  ul#list {
    list-style: none;
    max-height: 50vh;
    overflow-y: auto;
  }
  ul#list li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid #f7fafc;
    transition: background 0.1s;
  }
  ul#list li:hover { background: #f7fafc; }
  ul#list li:last-child { border-bottom: none; }
  ul#list input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: #667eea;
    flex-shrink: 0;
  }
  ul#list .text {
    flex: 1;
    font-size: 16px;
    color: #2d3748;
    word-break: break-word;
  }
  ul#list li.done .text {
    text-decoration: line-through;
    color: #a0aec0;
  }
  ul#list .delete-btn {
    background: transparent;
    border: none;
    color: #cbd5e0;
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  ul#list .delete-btn:hover { color: #e53e3e; background: #fed7d7; }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #a0aec0;
    font-size: 14px;
  }
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    background: #f7fafc;
    border-top: 1px solid #edf2f7;
    font-size: 13px;
    color: #718096;
  }
  #clear-done {
    background: transparent;
    border: none;
    color: #718096;
    cursor: pointer;
    font-size: 13px;
    text-decoration: underline;
  }
  #clear-done:hover { color: #e53e3e; }
  #clear-done:disabled { opacity: 0.4; cursor: not-allowed; text-decoration: none; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <p>오늘 사야 할 것들</p>
    </header>
    <div class="input-row">
      <input id="item-input" type="text" placeholder="아이템 입력 후 Enter" maxlength="80" autofocus>
      <button id="add-btn">추가</button>
    </div>
    <ul id="list"></ul>
    <footer>
      <span id="counter">0개</span>
      <button id="clear-done">완료 항목 지우기</button>
    </footer>
  </div>

<script>
  const STORAGE_KEY = "shopping-list-items";
  const listEl = document.getElementById("list");
  const inputEl = document.getElementById("item-input");
  const addBtn = document.getElementById("add-btn");
  const counterEl = document.getElementById("counter");
  const clearDoneBtn = document.getElementById("clear-done");

  let items = load();

  function load() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function render() {
    listEl.innerHTML = "";
    if (items.length === 0) {
      const empty = document.createElement("li");
      empty.className = "empty";
      empty.textContent = "리스트가 비어있어요. 첫 아이템을 추가해 보세요!";
      listEl.appendChild(empty);
    } else {
      items.forEach((item) => {
        const li = document.createElement("li");
        if (item.done) li.classList.add("done");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = item.done;
        checkbox.addEventListener("change", () => toggle(item.id));

        const text = document.createElement("span");
        text.className = "text";
        text.textContent = item.text;

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.innerHTML = "&times;";
        del.title = "삭제";
        del.addEventListener("click", () => remove(item.id));

        li.append(checkbox, text, del);
        listEl.appendChild(li);
      });
    }

    const remaining = items.filter((i) => !i.done).length;
    const doneCount = items.length - remaining;
    counterEl.textContent = `남은 항목 ${remaining}개 · 완료 ${doneCount}개`;
    clearDoneBtn.disabled = doneCount === 0;
  }

  function add() {
    const text = inputEl.value.trim();
    if (!text) return;
    items.push({ id: Date.now() + Math.random(), text, done: false });
    inputEl.value = "";
    save();
    render();
    inputEl.focus();
  }

  function toggle(id) {
    const item = items.find((i) => i.id === id);
    if (item) {
      item.done = !item.done;
      save();
      render();
    }
  }

  function remove(id) {
    items = items.filter((i) => i.id !== id);
    save();
    render();
  }

  function clearDone() {
    items = items.filter((i) => !i.done);
    save();
    render();
  }

  addBtn.addEventListener("click", add);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") add();
  });
  clearDoneBtn.addEventListener("click", clearDone);

  render();
</script>
</body>
</html>
