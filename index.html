<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 리스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 480px;
    overflow: hidden;
  }
  header {
    background: #4a5568;
    color: #fff;
    padding: 24px;
    text-align: center;
  }
  header h1 { font-size: 24px; font-weight: 600; }
  header p { margin-top: 4px; font-size: 13px; opacity: 0.8; }
  .input-row {
    display: flex;
    gap: 8px;
    padding: 20px;
    border-bottom: 1px solid #edf2f7;
  }
  #item-input {
    flex: 1;
    padding: 12px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  #item-input:focus { border-color: #667eea; }
  #add-btn {
    padding: 12px 20px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #add-btn:hover { background: #5568d3; }
  #add-btn:active { transform: translateY(1px); }
  ul#list {
    list-style: none;
    max-height: 50vh;
    overflow-y: auto;
  }
  ul#list li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid #f7fafc;
    transition: background 0.1s;
  }
  ul#list li:hover { background: #f7fafc; }
  ul#list li:last-child { border-bottom: none; }
  ul#list input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: #667eea;
    flex-shrink: 0;
  }
  ul#list .text {
    flex: 1;
    font-size: 16px;
    color: #2d3748;
    word-break: break-word;
  }
  ul#list li.done .text {
    text-decoration: line-through;
    color: #a0aec0;
  }
  ul#list .delete-btn {
    background: transparent;
    border: none;
    color: #cbd5e0;
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  ul#list .delete-btn:hover { color: #e53e3e; background: #fed7d7; }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #a0aec0;
    font-size: 14px;
  }
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    background: #f7fafc;
    border-top: 1px solid #edf2f7;
    font-size: 13px;
    color: #718096;
  }
  #clear-done {
    background: transparent;
    border: none;
    color: #718096;
    cursor: pointer;
    font-size: 13px;
    text-decoration: underline;
  }
  #clear-done:hover { color: #e53e3e; }
  #clear-done:disabled { opacity: 0.4; cursor: not-allowed; text-decoration: none; }
  .status {
    text-align: center;
    padding: 12px 20px;
    font-size: 13px;
    color: #718096;
  }
  .status.error { color: #c53030; background: #fff5f5; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <p>오늘 사야 할 것들</p>
    </header>
    <div class="input-row">
      <input id="item-input" type="text" placeholder="아이템 입력 후 Enter" maxlength="80" autofocus>
      <button id="add-btn">추가</button>
    </div>
    <ul id="list"></ul>
    <div id="status" class="status" hidden></div>
    <footer>
      <span id="counter">0개</span>
      <button id="clear-done">완료 항목 지우기</button>
    </footer>
  </div>

<script type="module">
  // Supabase 연동 쇼핑 리스트 클라이언트 (CRUD를 shopping_items 테이블에 위임)
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const SUPABASE_URL = "https://cshvrnaiqgbppuzccgnf.supabase.co";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_GY86VGpan9tGPlPvQSDbWA_JDeFIgdN";
  const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

  const listEl = document.getElementById("list");
  const inputEl = document.getElementById("item-input");
  const addBtn = document.getElementById("add-btn");
  const counterEl = document.getElementById("counter");
  const clearDoneBtn = document.getElementById("clear-done");
  const statusEl = document.getElementById("status");

  let items = [];

  function setStatus(message, isError = false) {
    if (!message) {
      statusEl.hidden = true;
      statusEl.textContent = "";
      statusEl.classList.remove("error");
      return;
    }
    statusEl.hidden = false;
    statusEl.textContent = message;
    statusEl.classList.toggle("error", isError);
  }

  function render() {
    listEl.innerHTML = "";
    if (items.length === 0) {
      const empty = document.createElement("li");
      empty.className = "empty";
      empty.textContent = "리스트가 비어있어요. 첫 아이템을 추가해 보세요!";
      listEl.appendChild(empty);
    } else {
      items.forEach((item) => {
        const li = document.createElement("li");
        if (item.done) li.classList.add("done");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = item.done;
        checkbox.addEventListener("change", () => toggle(item.id));

        const text = document.createElement("span");
        text.className = "text";
        text.textContent = item.text;

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.innerHTML = "&times;";
        del.title = "삭제";
        del.addEventListener("click", () => remove(item.id));

        li.append(checkbox, text, del);
        listEl.appendChild(li);
      });
    }

    const remaining = items.filter((i) => !i.done).length;
    const doneCount = items.length - remaining;
    counterEl.textContent = `남은 항목 ${remaining}개 · 완료 ${doneCount}개`;
    clearDoneBtn.disabled = doneCount === 0;
  }

  async function loadItems() {
    setStatus("불러오는 중…");
    const { data, error } = await supabase
      .from("shopping_items")
      .select("id, text, done, created_at")
      .order("created_at", { ascending: true });
    if (error) {
      setStatus(`불러오기 실패: ${error.message}`, true);
      return;
    }
    items = data ?? [];
    setStatus("");
    render();
  }

  async function add() {
    const text = inputEl.value.trim();
    if (!text) return;
    addBtn.disabled = true;
    const { data, error } = await supabase
      .from("shopping_items")
      .insert({ text, done: false })
      .select("id, text, done, created_at")
      .single();
    addBtn.disabled = false;
    if (error) {
      setStatus(`추가 실패: ${error.message}`, true);
      return;
    }
    items.push(data);
    inputEl.value = "";
    setStatus("");
    render();
    inputEl.focus();
  }

  async function toggle(id) {
    const item = items.find((i) => i.id === id);
    if (!item) return;
    const next = !item.done;
    item.done = next;
    render();
    const { error } = await supabase
      .from("shopping_items")
      .update({ done: next })
      .eq("id", id);
    if (error) {
      item.done = !next;
      render();
      setStatus(`업데이트 실패: ${error.message}`, true);
    }
  }

  async function remove(id) {
    const prev = items;
    items = items.filter((i) => i.id !== id);
    render();
    const { error } = await supabase.from("shopping_items").delete().eq("id", id);
    if (error) {
      items = prev;
      render();
      setStatus(`삭제 실패: ${error.message}`, true);
    }
  }

  async function clearDone() {
    const doneIds = items.filter((i) => i.done).map((i) => i.id);
    if (doneIds.length === 0) return;
    const prev = items;
    items = items.filter((i) => !i.done);
    render();
    const { error } = await supabase
      .from("shopping_items")
      .delete()
      .in("id", doneIds);
    if (error) {
      items = prev;
      render();
      setStatus(`완료 항목 삭제 실패: ${error.message}`, true);
    }
  }

  addBtn.addEventListener("click", add);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") add();
  });
  clearDoneBtn.addEventListener("click", clearDone);

  loadItems();
</script>
</body>
</html>
